<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Calculator</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        padding: 20px;
    }

    .calculator {
        background: #1f2937;
        padding: 20px;
        border-radius: 20px;
        width: 100%;
        max-width: 350px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    #display {
        width: 100%;
        height: 70px;
        border: none;
        outline: none;
        border-radius: 10px;
        margin-bottom: 15px;
        text-align: right;
        font-size: 2rem;
        padding: 10px;
        background: #111827;
        color: white;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    button {
        border: none;
        padding: 18px;
        font-size: 1.2rem;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        transform: scale(1.05);
    }

    .number {
        background: #374151;
        color: white;
    }

    .operator {
        background: #f59e0b;
        color: white;
    }

    .equal {
        background: #10b981;
        color: white;
        grid-column: span 2;
    }

    .clear {
        background: #ef4444;
        color: white;
    }

    @media (max-width: 400px) {
        button {
            padding: 15px;
            font-size: 1rem;
        }

        #display {
            font-size: 1.5rem;
        }
    }
</style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendValue('/')">÷</button>
        <button class="operator" onclick="appendValue('*')">×</button>
        <button class="operator" onclick="deleteLast()">⌫</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('.')">.</button>

        <button class="number" onclick="appendValue('0')">0</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");

    function appendValue(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = "";
    }

    function deleteLast() {
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        try {
            display.value = eval(display.value);
        } catch {
            display.value = "Error";
        }
    }

    document.addEventListener("keydown", (e) => {
        const allowed = "0123456789+-*/.";
        
        if (allowed.includes(e.key)) {
            appendValue(e.key);
        } else if (e.key === "Enter") {
            calculate();
        } else if (e.key === "Backspace") {
            deleteLast();
        } else if (e.key === "Escape") {
            clearDisplay();
        }
    });
</script>

</body>
</html>
